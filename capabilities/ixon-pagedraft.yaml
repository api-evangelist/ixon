naftiko: 1.0.0-alpha2
info:
  label: IXON API — PageDraft
  description: 'IXON API — PageDraft. 1 operations. Lead operation: PageDraft. Self-contained Naftiko capability covering
    one Ixon business surface.'
  tags:
  - Ixon
  - PageDraft
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-pagedraft
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — PageDraft business capability. Self-contained, no shared references.
    resources:
    - name: pages-publicId-draft
      path: /pages/{publicId}/draft
      operations:
      - name: post
        method: POST
        description: PageDraft
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publicId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-pagedraft-rest
    port: 8080
    description: REST adapter for IXON API — PageDraft. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/pages/{publicid}/draft
      name: pages-publicid-draft
      description: REST surface for pages-publicId-draft.
      operations:
      - method: POST
        name: post
        description: PageDraft
        call: ixon-pagedraft.post
        with:
          publicId: rest.publicId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-pagedraft-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — PageDraft. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: pagedraft
      description: PageDraft
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ixon-pagedraft.post
      with:
        publicId: tools.publicId
      outputParameters:
      - type: object
        mapping: $.
