    one Ixon business surface.'
  tags:
  - Ixon
  - MyAccessToken
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-myaccesstoken
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — MyAccessToken business capability. Self-contained, no shared references.
    resources:
    - name: access-tokens-me
      path: /access-tokens/me
      operations:
      - name: get
        method: GET
        description: MyAccessToken
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete
        method: DELETE
        description: MyAccessToken
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-myaccesstoken-rest
    port: 8080
    description: REST adapter for IXON API — MyAccessToken. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/access-tokens/me
      name: access-tokens-me
      description: REST surface for access-tokens-me.
      operations:
      - method: GET
        name: get
        description: MyAccessToken
        call: ixon-myaccesstoken.get
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: MyAccessToken
        call: ixon-myaccesstoken.delete
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-myaccesstoken-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — MyAccessToken. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: myaccesstoken
      description: MyAccessToken
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ixon-myaccesstoken.get
      outputParameters:
      - type: object
        mapping: $.
    - name: myaccesstoken-2
      description: MyAccessToken
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: ixon-myaccesstoken.delete
      outputParameters:
      - type: object
        mapping: $.
