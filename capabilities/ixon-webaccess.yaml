naftiko: 1.0.0-alpha2
info:
  label: IXON API — WebAccess
  description: 'IXON API — WebAccess. 1 operations. Lead operation: WebAccess. Self-contained Naftiko capability covering
    one Ixon business surface.'
  tags:
  - Ixon
  - WebAccess
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-webaccess
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — WebAccess business capability. Self-contained, no shared references.
    resources:
    - name: web-access
      path: /web-access
      operations:
      - name: post
        method: POST
        description: WebAccess
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-webaccess-rest
    port: 8080
    description: REST adapter for IXON API — WebAccess. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/web-access
      name: web-access
      description: REST surface for web-access.
      operations:
      - method: POST
        name: post
        description: WebAccess
        call: ixon-webaccess.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-webaccess-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — WebAccess. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: webaccess
      description: WebAccess
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ixon-webaccess.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
