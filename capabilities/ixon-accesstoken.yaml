naftiko: 1.0.0-alpha2
info:
  label: IXON API — AccessToken
  description: 'IXON API — AccessToken. 2 operations. Lead operation: AccessToken. Self-contained Naftiko capability covering
    one Ixon business surface.'
  tags:
  - Ixon
  - AccessToken
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-accesstoken
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — AccessToken business capability. Self-contained, no shared references.
    resources:
    - name: access-tokens-publicId
      path: /access-tokens/{publicId}
      operations:
      - name: get
        method: GET
        description: AccessToken
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publicId
          in: path
          type: string
          required: true
      - name: delete
        method: DELETE
        description: AccessToken
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publicId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-accesstoken-rest
    port: 8080
    description: REST adapter for IXON API — AccessToken. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/access-tokens/{publicid}
      name: access-tokens-publicid
      description: REST surface for access-tokens-publicId.
      operations:
      - method: GET
        name: get
        description: AccessToken
        call: ixon-accesstoken.get
        with:
          publicId: rest.publicId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: AccessToken
        call: ixon-accesstoken.delete
        with:
          publicId: rest.publicId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-accesstoken-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — AccessToken. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: accesstoken
      description: AccessToken
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ixon-accesstoken.get
      with:
        publicId: tools.publicId
      outputParameters:
      - type: object
        mapping: $.
    - name: accesstoken-2
      description: AccessToken
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: ixon-accesstoken.delete
      with:
        publicId: tools.publicId
      outputParameters:
      - type: object
        mapping: $.
