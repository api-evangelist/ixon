naftiko: 1.0.0-alpha2
info:
  label: IXON API — PagePage
  description: 'IXON API — PagePage. 2 operations. Lead operation: PagePage. Self-contained Naftiko capability covering one
    Ixon business surface.'
  tags:
  - Ixon
  - PagePage
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-pagepage
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — PagePage business capability. Self-contained, no shared references.
    resources:
    - name: pages-pages-publicId
      path: /pages-pages/{publicId}
      operations:
      - name: get
        method: GET
        description: PagePage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publicId
          in: path
          type: string
          required: true
      - name: delete
        method: DELETE
        description: PagePage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publicId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-pagepage-rest
    port: 8080
    description: REST adapter for IXON API — PagePage. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/pages-pages/{publicid}
      name: pages-pages-publicid
      description: REST surface for pages-pages-publicId.
      operations:
      - method: GET
        name: get
        description: PagePage
        call: ixon-pagepage.get
        with:
          publicId: rest.publicId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: PagePage
        call: ixon-pagepage.delete
        with:
          publicId: rest.publicId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-pagepage-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — PagePage. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: pagepage
      description: PagePage
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ixon-pagepage.get
      with:
        publicId: tools.publicId
      outputParameters:
      - type: object
        mapping: $.
    - name: pagepage-2
      description: PagePage
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: ixon-pagepage.delete
      with:
        publicId: tools.publicId
      outputParameters:
      - type: object
        mapping: $.
