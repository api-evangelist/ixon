naftiko: 1.0.0-alpha2
info:
  label: IXON API — PremiumDomain
  description: 'IXON API — PremiumDomain. 1 operations. Lead operation: PremiumDomain. Self-contained Naftiko capability covering
    one Ixon business surface.'
  tags:
  - Ixon
  - PremiumDomain
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-premiumdomain
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — PremiumDomain business capability. Self-contained, no shared references.
    resources:
    - name: premium-domain
      path: /premium/domain
      operations:
      - name: post
        method: POST
        description: PremiumDomain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-premiumdomain-rest
    port: 8080
    description: REST adapter for IXON API — PremiumDomain. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/premium/domain
      name: premium-domain
      description: REST surface for premium-domain.
      operations:
      - method: POST
        name: post
        description: PremiumDomain
        call: ixon-premiumdomain.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-premiumdomain-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — PremiumDomain. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: premiumdomain
      description: PremiumDomain
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ixon-premiumdomain.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
