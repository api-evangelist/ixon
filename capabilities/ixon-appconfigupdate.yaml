naftiko: 1.0.0-alpha2
info:
  label: IXON API — AppConfigUpdate
  description: 'IXON API — AppConfigUpdate. 1 operations. Lead operation: AppConfigUpdate. Self-contained Naftiko capability
    covering one Ixon business surface.'
  tags:
  - Ixon
  - AppConfigUpdate
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-appconfigupdate
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — AppConfigUpdate business capability. Self-contained, no shared references.
    resources:
    - name: app-configs
      path: /app-configs
      operations:
      - name: patch
        method: PATCH
        description: AppConfigUpdate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-appconfigupdate-rest
    port: 8080
    description: REST adapter for IXON API — AppConfigUpdate. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/app-configs
      name: app-configs
      description: REST surface for app-configs.
      operations:
      - method: PATCH
        name: patch
        description: AppConfigUpdate
        call: ixon-appconfigupdate.patch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-appconfigupdate-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — AppConfigUpdate. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: appconfigupdate
      description: AppConfigUpdate
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: ixon-appconfigupdate.patch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
