naftiko: 1.0.0-alpha2
info:
  label: IXON API — ServiceAccount
  description: 'IXON API — ServiceAccount. 1 operations. Lead operation: ServiceAccount. Self-contained Naftiko capability
    covering one Ixon business surface.'
  tags:
  - Ixon
  - ServiceAccount
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-serviceaccount
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — ServiceAccount business capability. Self-contained, no shared references.
    resources:
    - name: users-service-account-publicId
      path: /users/service-account/{publicId}
      operations:
      - name: delete
        method: DELETE
        description: ServiceAccount
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publicId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-serviceaccount-rest
    port: 8080
    description: REST adapter for IXON API — ServiceAccount. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/users/service-account/{publicid}
      name: users-service-account-publicid
      description: REST surface for users-service-account-publicId.
      operations:
      - method: DELETE
        name: delete
        description: ServiceAccount
        call: ixon-serviceaccount.delete
        with:
          publicId: rest.publicId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-serviceaccount-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — ServiceAccount. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: serviceaccount
      description: ServiceAccount
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: ixon-serviceaccount.delete
      with:
        publicId: tools.publicId
      outputParameters:
      - type: object
        mapping: $.
