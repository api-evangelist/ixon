naftiko: 1.0.0-alpha2
info:
  label: IXON API — Discovery
  description: 'IXON API — Discovery. 1 operations. Lead operation: Discovery. Self-contained Naftiko capability covering
    one Ixon business surface.'
  tags:
  - Ixon
  - Discovery
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-discovery
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — Discovery business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: get
        method: GET
        description: Discovery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-discovery-rest
    port: 8080
    description: REST adapter for IXON API — Discovery. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: GET
        name: get
        description: Discovery
        call: ixon-discovery.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-discovery-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — Discovery. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: discovery
      description: Discovery
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ixon-discovery.get
      outputParameters:
      - type: object
        mapping: $.
