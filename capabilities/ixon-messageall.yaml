  description: 'IXON API — MessageAll. 1 operations. Lead operation: MessageAll. Self-contained Naftiko capability covering
    one Ixon business surface.'
  tags:
  - Ixon
  - MessageAll
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-messageall
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — MessageAll business capability. Self-contained, no shared references.
    resources:
    - name: messages-all
      path: /messages/all
      operations:
      - name: patch
        method: PATCH
        description: MessageAll
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-messageall-rest
    port: 8080
    description: REST adapter for IXON API — MessageAll. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/messages/all
      name: messages-all
      description: REST surface for messages-all.
      operations:
      - method: PATCH
        name: patch
        description: MessageAll
        call: ixon-messageall.patch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-messageall-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — MessageAll. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: messageall
      description: MessageAll
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: ixon-messageall.patch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
