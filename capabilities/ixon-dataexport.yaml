naftiko: 1.0.0-alpha2
info:
  label: IXON API — DataExport
  description: 'IXON API — DataExport. 1 operations. Lead operation: DataExport. Self-contained Naftiko capability covering
    one Ixon business surface.'
  tags:
  - Ixon
  - DataExport
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-dataexport
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — DataExport business capability. Self-contained, no shared references.
    resources:
    - name: data-export
      path: /data-export
      operations:
      - name: post
        method: POST
        description: DataExport
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-dataexport-rest
    port: 8080
    description: REST adapter for IXON API — DataExport. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/data-export
      name: data-export
      description: REST surface for data-export.
      operations:
      - method: POST
        name: post
        description: DataExport
        call: ixon-dataexport.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-dataexport-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — DataExport. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: dataexport
      description: DataExport
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ixon-dataexport.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
