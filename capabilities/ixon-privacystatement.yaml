    resources:
    - name: privacy-statements-publicId
      path: /privacy-statements/{publicId}
      operations:
      - name: get
        method: GET
        description: PrivacyStatement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
