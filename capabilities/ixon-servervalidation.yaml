naftiko: 1.0.0-alpha2
info:
  label: IXON API — ServerValidation
  description: 'IXON API — ServerValidation. 1 operations. Lead operation: ServerValidation. Self-contained Naftiko capability
    covering one Ixon business surface.'
  tags:
  - Ixon
  - ServerValidation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-servervalidation
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — ServerValidation business capability. Self-contained, no shared references.
    resources:
    - name: server-validation
      path: /server-validation
      operations:
      - name: get
        method: GET
        description: ServerValidation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-servervalidation-rest
    port: 8080
    description: REST adapter for IXON API — ServerValidation. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/server-validation
      name: server-validation
      description: REST surface for server-validation.
      operations:
      - method: GET
        name: get
        description: ServerValidation
        call: ixon-servervalidation.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-servervalidation-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — ServerValidation. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: servervalidation
      description: ServerValidation
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ixon-servervalidation.get
      outputParameters:
      - type: object
        mapping: $.
