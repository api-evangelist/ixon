naftiko: 1.0.0-alpha2
info:
  label: IXON API — AppUninstall
  description: 'IXON API — AppUninstall. 1 operations. Lead operation: AppUninstall. Self-contained Naftiko capability covering
    one Ixon business surface.'
  tags:
  - Ixon
  - AppUninstall
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-appuninstall
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — AppUninstall business capability. Self-contained, no shared references.
    resources:
    - name: apps-uninstall-publicId
      path: /apps/uninstall/{publicId}
      operations:
      - name: delete
        method: DELETE
        description: AppUninstall
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publicId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-appuninstall-rest
    port: 8080
    description: REST adapter for IXON API — AppUninstall. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/apps/uninstall/{publicid}
      name: apps-uninstall-publicid
      description: REST surface for apps-uninstall-publicId.
      operations:
      - method: DELETE
        name: delete
        description: AppUninstall
        call: ixon-appuninstall.delete
        with:
          publicId: rest.publicId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-appuninstall-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — AppUninstall. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: appuninstall
      description: AppUninstall
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: ixon-appuninstall.delete
      with:
        publicId: tools.publicId
      outputParameters:
      - type: object
        mapping: $.
