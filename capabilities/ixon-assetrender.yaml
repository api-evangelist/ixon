naftiko: 1.0.0-alpha2
info:
  label: IXON API — AssetRender
  description: 'IXON API — AssetRender. 1 operations. Lead operation: AssetRender. Self-contained Naftiko capability covering
    one Ixon business surface.'
  tags:
  - Ixon
  - AssetRender
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-assetrender
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — AssetRender business capability. Self-contained, no shared references.
    resources:
    - name: assets-publicId-render
      path: /assets/{publicId}/render
      operations:
      - name: get
        method: GET
        description: AssetRender
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publicId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-assetrender-rest
    port: 8080
    description: REST adapter for IXON API — AssetRender. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/assets/{publicid}/render
      name: assets-publicid-render
      description: REST surface for assets-publicId-render.
      operations:
      - method: GET
        name: get
        description: AssetRender
        call: ixon-assetrender.get
        with:
          publicId: rest.publicId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-assetrender-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — AssetRender. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: assetrender
      description: AssetRender
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ixon-assetrender.get
      with:
        publicId: tools.publicId
      outputParameters:
      - type: object
        mapping: $.
