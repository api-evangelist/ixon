naftiko: 1.0.0-alpha2
info:
  label: IXON API — Role
  description: 'IXON API — Role. 3 operations. Lead operation: Role. Self-contained Naftiko capability covering one Ixon business
    surface.'
  tags:
  - Ixon
  - Role
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-role
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — Role business capability. Self-contained, no shared references.
    resources:
    - name: roles-publicId
      path: /roles/{publicId}
      operations:
      - name: get
        method: GET
        description: Role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publicId
          in: path
          type: string
          required: true
      - name: patch
        method: PATCH
        description: Role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publicId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: delete
        method: DELETE
        description: Role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publicId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-role-rest
    port: 8080
    description: REST adapter for IXON API — Role. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/roles/{publicid}
      name: roles-publicid
      description: REST surface for roles-publicId.
      operations:
      - method: GET
        name: get
        description: Role
        call: ixon-role.get
        with:
          publicId: rest.publicId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patch
        description: Role
        call: ixon-role.patch
        with:
          publicId: rest.publicId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: Role
        call: ixon-role.delete
        with:
          publicId: rest.publicId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-role-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — Role. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: role
      description: Role
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ixon-role.get
      with:
        publicId: tools.publicId
      outputParameters:
      - type: object
        mapping: $.
    - name: role-2
      description: Role
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: ixon-role.patch
      with:
        publicId: tools.publicId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: role-3
      description: Role
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: ixon-role.delete
      with:
        publicId: tools.publicId
      outputParameters:
      - type: object
        mapping: $.
