naftiko: 1.0.0-alpha2
info:
  label: IXON API — PageImport
  description: 'IXON API — PageImport. 1 operations. Lead operation: PageImport. Self-contained Naftiko capability covering
    one Ixon business surface.'
  tags:
  - Ixon
  - PageImport
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-pageimport
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — PageImport business capability. Self-contained, no shared references.
    resources:
    - name: page-import
      path: /page-import
      operations:
      - name: post
        method: POST
        description: PageImport
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-pageimport-rest
    port: 8080
    description: REST adapter for IXON API — PageImport. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/page-import
      name: page-import
      description: REST surface for page-import.
      operations:
      - method: POST
        name: post
        description: PageImport
        call: ixon-pageimport.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-pageimport-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — PageImport. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: pageimport
      description: PageImport
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ixon-pageimport.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
