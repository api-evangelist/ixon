naftiko: 1.0.0-alpha2
info:
  label: IXON API — Invite
  description: 'IXON API — Invite. 2 operations. Lead operation: Invite. Self-contained Naftiko capability covering one Ixon
    business surface.'
  tags:
  - Ixon
  - Invite
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-invite
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — Invite business capability. Self-contained, no shared references.
    resources:
    - name: invites-publicId
      path: /invites/{publicId}
      operations:
      - name: get
        method: GET
        description: Invite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publicId
          in: path
          type: string
          required: true
      - name: delete
        method: DELETE
        description: Invite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publicId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-invite-rest
    port: 8080
    description: REST adapter for IXON API — Invite. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/invites/{publicid}
      name: invites-publicid
      description: REST surface for invites-publicId.
      operations:
      - method: GET
        name: get
        description: Invite
        call: ixon-invite.get
        with:
          publicId: rest.publicId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: Invite
        call: ixon-invite.delete
        with:
          publicId: rest.publicId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-invite-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — Invite. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: invite
      description: Invite
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ixon-invite.get
      with:
        publicId: tools.publicId
      outputParameters:
      - type: object
        mapping: $.
    - name: invite-2
      description: Invite
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: ixon-invite.delete
      with:
        publicId: tools.publicId
      outputParameters:
      - type: object
        mapping: $.
