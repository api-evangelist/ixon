naftiko: 1.0.0-alpha2
info:
  label: IXON API — SectorList
  description: 'IXON API — SectorList. 1 operations. Lead operation: SectorList. Self-contained Naftiko capability covering
    one Ixon business surface.'
  tags:
  - Ixon
  - SectorList
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-sectorlist
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — SectorList business capability. Self-contained, no shared references.
    resources:
    - name: sectors
      path: /sectors
      operations:
      - name: get
        method: GET
        description: SectorList
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-sectorlist-rest
    port: 8080
    description: REST adapter for IXON API — SectorList. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/sectors
      name: sectors
      description: REST surface for sectors.
      operations:
      - method: GET
        name: get
        description: SectorList
        call: ixon-sectorlist.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-sectorlist-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — SectorList. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: sectorlist
      description: SectorList
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ixon-sectorlist.get
      outputParameters:
      - type: object
        mapping: $.
