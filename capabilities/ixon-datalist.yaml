naftiko: 1.0.0-alpha2
info:
  label: IXON API — DataList
  description: 'IXON API — DataList. 1 operations. Lead operation: DataList. Self-contained Naftiko capability covering one
    Ixon business surface.'
  tags:
  - Ixon
  - DataList
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-datalist
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — DataList business capability. Self-contained, no shared references.
    resources:
    - name: data
      path: /data
      operations:
      - name: post
        method: POST
        description: DataList
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-datalist-rest
    port: 8080
    description: REST adapter for IXON API — DataList. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/data
      name: data
      description: REST surface for data.
      operations:
      - method: POST
        name: post
        description: DataList
        call: ixon-datalist.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-datalist-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — DataList. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: datalist
      description: DataList
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ixon-datalist.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
