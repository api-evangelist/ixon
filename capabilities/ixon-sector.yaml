naftiko: 1.0.0-alpha2
info:
  label: IXON API — Sector
  description: 'IXON API — Sector. 1 operations. Lead operation: Sector. Self-contained Naftiko capability covering one Ixon
    business surface.'
  tags:
  - Ixon
  - Sector
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-sector
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — Sector business capability. Self-contained, no shared references.
    resources:
    - name: sectors-publicId
      path: /sectors/{publicId}
      operations:
      - name: get
        method: GET
        description: Sector
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publicId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-sector-rest
    port: 8080
    description: REST adapter for IXON API — Sector. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/sectors/{publicid}
      name: sectors-publicid
      description: REST surface for sectors-publicId.
      operations:
      - method: GET
        name: get
        description: Sector
        call: ixon-sector.get
        with:
          publicId: rest.publicId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-sector-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — Sector. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: sector
      description: Sector
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ixon-sector.get
      with:
        publicId: tools.publicId
      outputParameters:
      - type: object
        mapping: $.
