naftiko: 1.0.0-alpha2
info:
  label: IXON API — TrustedDevice
  description: 'IXON API — TrustedDevice. 1 operations. Lead operation: TrustedDevice. Self-contained Naftiko capability covering
    one Ixon business surface.'
  tags:
  - Ixon
  - TrustedDevice
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-trusteddevice
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — TrustedDevice business capability. Self-contained, no shared references.
    resources:
    - name: trusted-devices-publicId
      path: /trusted-devices/{publicId}
      operations:
      - name: delete
        method: DELETE
        description: TrustedDevice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publicId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-trusteddevice-rest
    port: 8080
    description: REST adapter for IXON API — TrustedDevice. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/trusted-devices/{publicid}
      name: trusted-devices-publicid
      description: REST surface for trusted-devices-publicId.
      operations:
      - method: DELETE
        name: delete
        description: TrustedDevice
        call: ixon-trusteddevice.delete
        with:
          publicId: rest.publicId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-trusteddevice-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — TrustedDevice. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: trusteddevice
      description: TrustedDevice
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: ixon-trusteddevice.delete
      with:
        publicId: tools.publicId
      outputParameters:
      - type: object
        mapping: $.
