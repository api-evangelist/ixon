naftiko: 1.0.0-alpha2
info:
  label: IXON API — CustomProperty
  description: 'IXON API — CustomProperty. 1 operations. Lead operation: CustomProperty. Self-contained Naftiko capability
    covering one Ixon business surface.'
  tags:
  - Ixon
  - CustomProperty
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IXON_API_KEY: IXON_API_KEY
capability:
  consumes:
  - type: http
    namespace: ixon-customproperty
    baseUri: https://portal.ixon.cloud:443/api
    description: IXON API — CustomProperty business capability. Self-contained, no shared references.
    resources:
    - name: custom-properties-publicId
      path: /custom-properties/{publicId}
      operations:
      - name: get
        method: GET
        description: CustomProperty
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publicId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.IXON_API_KEY}}'
  exposes:
  - type: rest
    namespace: ixon-customproperty-rest
    port: 8080
    description: REST adapter for IXON API — CustomProperty. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/custom-properties/{publicid}
      name: custom-properties-publicid
      description: REST surface for custom-properties-publicId.
      operations:
      - method: GET
        name: get
        description: CustomProperty
        call: ixon-customproperty.get
        with:
          publicId: rest.publicId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ixon-customproperty-mcp
    port: 9090
    transport: http
    description: MCP adapter for IXON API — CustomProperty. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: customproperty
      description: CustomProperty
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ixon-customproperty.get
      with:
        publicId: tools.publicId
      outputParameters:
      - type: object
        mapping: $.
