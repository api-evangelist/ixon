modified: '2026-04-28'
specificationVersion: '0.19'
apis:
  - aid: ixon:ixon-api
    name: IXON Cloud API
    description: >-
      The IXON Cloud API is an open, public REST API that provides programmatic
      access to the IXON industrial IoT platform, enabling management of
      devices, agents, access requests, machine data, and remote access
      connectivity. The API exposes 359 endpoints across the IXON Cloud
      platform.
    humanURL: https://developer.ixon.cloud/docs
    baseURL: https://portal.ixon.cloud/api/
    tags:
      - Industrial IoT
      - Machine Data
      - Remote Access
      - Device Management
    properties:
