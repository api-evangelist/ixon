aid: ixon
name: IXON
description: >-
  IXON is an industrial IoT platform that enables machine builders and end-users
  to connect, monitor, and control industrial machines remotely. IXON provides
  APIs for accessing machine data, remote access management, and industrial
  IoT connectivity.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
