aid: ixon
name: IXON
description: IXON is an industrial IoT platform that enables machine builders and end-users to connect, monitor, and control
  industrial machines remotely. IXON provides APIs for accessing machine data, remote access management, and industrial IoT
  connectivity.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - IIoT
  - Industrial IoT
  - Machine Connectivity
  - Remote Access
url: https://raw.githubusercontent.com/api-evangelist/ixon/refs/heads/main/apis.yml
created: '2026-03-16'
modified: '2026-05-19'
specificationVersion: '0.19'
